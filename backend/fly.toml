# fly.toml app configuration file generated for legacylens-api on 2026-03-02T15:57:10-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'legacylens-api'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
